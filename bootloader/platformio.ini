; Resident bootloader (Teensy 4.1). The ROM-booted image at 0x60000000.
; Build:  pio run -d bootloader   (or `make bootloader` from the repo root)
; Output: .pio/build/teensy41/firmware.hex
[env:teensy41]
platform = teensy@5.1.0
board = teensy41
framework = arduino
monitor_speed = 115200
; Stock layout but FLASH bounded to the first 256 KiB.
board_build.ldscript = ../ld/bootloader.ld

; Pull the OTA sources from the library root (one level up); srcDir is `src`, so
; this compiles ../src/* only — the bootloader/ subdir is not re-scanned.
lib_deps =
  teensy-ota=symlink://..
build_flags =
  -I../src
  -fno-exceptions
  -D NO_PRAGMA_MARK
upload_protocol = custom
upload_command = tycmd upload $SOURCE