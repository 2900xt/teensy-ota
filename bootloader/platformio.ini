; Shared Vigil resident bootloader (Teensy 4.1).
; Build:  pio run -d common/ota/bootloader
; Output: .pio/build/teensy41/firmware.hex  (covers 0x60000000..0x6003FFFF)
;
; This is the ROM-booted image and it is application-agnostic: it validates the
; app_header at the slot base (APP_SLOT_A_BASE) and branches into whichever Vigil
; application is linked at 0x60040000 (the `*_slotA` env of a firmware project,
; e.g. core/top-panel-firmware or core/gcs-firmware). The same bootloader binary
; serves every Teensy firmware, so it is built once and merged with each app.
; Kept intentionally minimal: the SD/flash/rollback logic is added in later steps.
[env:teensy41]
platform = teensy@5.1.0
board = teensy41
framework = arduino
monitor_speed = 115200
; Resident bootloader: stock layout but FLASH bounded to the first 256 KiB.
board_build.ldscript = ../ld/bootloader.ld
; Pull in the shared OTA sources (app_header, ota_flash, ...) from common/ota.
; The library's srcDir is `src`, so this compiles common/ota/src/* only — the
; bootloader/ subdir is not re-scanned.
lib_deps =
  VigilOta=symlink://..
build_flags =
  -I../src
  -fno-exceptions
  -D NO_PRAGMA_MARK
; Define OTA_FLASH_SELFTEST to run the destructive flash bench test at boot:
;   pio run -d common/ota/bootloader -e teensy41 ... or add it here temporarily.
; build_flags += -D OTA_FLASH_SELFTEST
