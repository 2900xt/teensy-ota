; Example consumer firmware for the teensy-ota library.
;
; A minimal blink app that demonstrates the three build layouts a real firmware
; project provides when it opts into OTA. Build from the repo root with `make`,
; or directly, e.g.:
;   pio run -d examples/blink_slotA -e teensy41_slotA
;
; The library is pulled in via `lib_deps` as a symlink to the repo root (two
; levels up). A consuming project outside this repo points the symlink (or a
; git/registry dependency) at wherever teensy-ota lives.

[env]
platform = teensy@5.1.0
board = teensy41
framework = arduino
monitor_speed = 115200
build_flags = -D NO_PRAGMA_MARK
lib_deps =
  teensy-ota=symlink://../..

; Standalone image, linked at 0x60000000 (normal USB flashing / recovery).
; No app_header — the i.MX RT ROM boots this directly.
[env:teensy41]

; OTA-bootable image, linked at slot A (0x60040000). TEENSY_OTA_SLOT_BUILD makes
; the library emit an app_header at the slot base; app_slotA.ld pins it there.
[env:teensy41_slotA]
board_build.ldscript = ../../ld/app_slotA.ld
build_flags = ${env.build_flags} -D TEENSY_OTA_SLOT_BUILD

; GOLDEN recovery image, linked at slot B (0x603C0000). Same source as slot A,
; just a different link base — flashed once at manufacturing, never over OTA.
[env:teensy41_slotB]
board_build.ldscript = ../../ld/app_slotB.ld
build_flags = ${env.build_flags} -D TEENSY_OTA_SLOT_BUILD
